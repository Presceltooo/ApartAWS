name: CI/CD → ECR & EC2

on:
  push:
    branches:
      - main
  workflow_dispatch: # cho phép chạy thủ công từ GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}  # VD: 123456789.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: Build & Push tất cả images lên ECR
  # ─────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: api-gateway
            context: ./apps/api-gateway
            dockerfile: ./apps/api-gateway/Dockerfile
            ecr_repo: apps/api-gateway

          - name: auth-service
            context: ./apps/auth-service
            dockerfile: ./apps/auth-service/Dockerfile
            ecr_repo: apps/auth-service

          - name: apartment-service
            context: ./apps/apartment-service
            dockerfile: ./apps/apartment-service/Dockerfile
            ecr_repo: apps/apartment-service

          - name: booking-service
            context: ./apps/booking-service
            dockerfile: ./apps/booking-service/Dockerfile
            ecr_repo: apps/booking-service

          - name: web-portal
            context: ./apps/web-portal
            dockerfile: ./apps/web-portal/Dockerfile
            ecr_repo: apps/web-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build Docker image — ${{ matrix.service.name }}
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:latest \
            ${{ matrix.service.context }}

      - name: Push to ECR — ${{ matrix.service.name }}
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:latest

