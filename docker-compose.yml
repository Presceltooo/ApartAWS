version: '3.8'

services:
  # Database PostgreSQL
  database:
    image: postgres:15
    container_name: apart-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apart_booking
    ports:
      - "5432:5432"
    networks:
      - apart-network

  # Backend NestJS (Chạy dev mode với hot-reload)
  backend:
    image: node:20-alpine
    container_name: apart-backend
    working_dir: /app
    volumes:
      - ./apps/apartment-service:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3001:3000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: user
      DB_PASSWORD: password
      DB_NAME: apart_booking
      DATABASE_URL: postgresql://user:password@database:5432/apart_booking
    depends_on:
      - database
    networks:
      - apart-network

  # Frontend React Vite (Chạy dev mode với hot-reload)
  frontend:
    image: node:20-alpine
    container_name: apart-frontend
    working_dir: /app
    volumes:
      - ./apps/web-portal:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"
    depends_on:
      - backend
    networks:
      - apart-network

networks:
  apart-network:
    driver: bridge

# Note: Hai file Dockerfile bạn vừa tạo là dành cho môi trường PRODUCTION (Khi chạy thực tế / deploy server). 
# Ở môi trường DEV code hằng ngày, thay vì dùng Dockerfile để build tĩnh, mình dùng cấu hình 'volumes' ở trên 
# để copy trực tiếp code từ máy bạn vào Docker container, khi bạn code bằng VSCode, server mới tự load lại (hot-reload).